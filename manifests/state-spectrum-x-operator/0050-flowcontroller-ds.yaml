apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spectrum-x-flowcontroller
  namespace: {{ .RuntimeSpec.Namespace }}
  labels:
    control-plane: spectrum-x-flowcontroller
    app.kubernetes.io/name: spectrum-x-operator
spec:
  selector:
    matchLabels:
      control-plane: spectrum-x-flowcontroller
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: spectrum-x-flowcontroller
      labels:
        control-plane: spectrum-x-flowcontroller
    spec:
      nodeSelector:
        feature.node.kubernetes.io/pci-15b3.present: "true"
      tolerations:
        {{- if .Tolerations }}
        {{- .Tolerations | yaml | nindent 8 }}
        {{- end }}
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsNonRoot: false
      hostNetwork: true
      {{- if .CrSpec.ImagePullSecrets }}
      imagePullSecrets:
      {{- range .CrSpec.ImagePullSecrets }}
      - name: {{ . }}
      {{- end }}
      {{- end }}
      containers:
        - command:
            - /flowcontroller
          args:
            - --metrics-bind-address=0
            - --health-probe-bind-address=0
          image: {{ imagePath .CrSpec.Repository .CrSpec.Image .CrSpec.Version }}
          name: spectrum-x-flowcontroller
          env:
            {{- if .CrSpec.XPlane.Version }}
            - name: XPLANE_REPOSITORY
              value: {{ .CrSpec.XPlane.Repository }}
            - name: XPLANE_IMAGE
              value: {{ .CrSpec.XPlane.Image }}
            - name: XPLANE_VERSION
              value: {{ .CrSpec.XPlane.Version }}
            - name: IMAGE_PULL_SECRETS
              value: {{ join .CrSpec.XPlane.ImagePullSecrets "," }}
            {{- end }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              drop:
                - "ALL"
          volumeMounts:
            - name: proc
              mountPath: /proc
            - name: sys
              mountPath: /sys
            - name: ovs
              mountPath: /var/run/openvswitch/
            - name: ovs-systemd-config
              mountPath: /etc/default/openvswitch-switch
          {{- with .RuntimeSpec.ContainerResources }}
          {{- with index . "spectrum-x-flowcontroller" }}
          resources:
            {{- if .Requests }}
            requests:
              {{ .Requests | yaml | nindent 14 }}
            {{- end }}
            {{- if .Limits }}
            limits:
              {{ .Limits | yaml | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- end }}
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: ovs
          hostPath:
            path: /var/run/openvswitch
        - name: ovs-systemd-config
          hostPath:
            path: /etc/default/openvswitch-switch
            type: FileOrCreate
        - name: host-cni-bin
          hostPath:
            path: {{ .RuntimeSpec.CniBinDirectory }}
            type: DirectoryOrCreate
      serviceAccountName: spectrum-x-operator
      {{- if .NodeAffinity }}
      affinity:
        nodeAffinity:
          {{- .NodeAffinity | yaml | nindent 10 }}
      {{- end }}
      terminationGracePeriodSeconds: 10
