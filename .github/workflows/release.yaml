name: Release

on:
  issues:
    types:
      - opened
      - reopened

jobs:
  determine-versions:
    if: startsWith(github.event.issue.title, 'Release v')
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN_NVIDIA_CI_CD }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
    steps:
      - uses: actions/checkout@v7
      - id: set-version
        run: |
          # full release version, i.e. v25.4.0-rc.1
          APP_VERSION=$(echo $ISSUE_TITLE | awk '{ print $2 }')
          echo "app_version=${APP_VERSION}" >> $GITHUB_OUTPUT
          echo "APP_VERSION=${APP_VERSION}" | tee -a $GITHUB_ENV

          # major.minor version with v prefix and x suffix, i.e. v25.4.x
          V_MAJOR_MINOR_X=$(echo $APP_VERSION | grep -Eo '^v[0-9]+\.[0-9]+').x
          echo "V_MAJOR_MINOR_X=${V_MAJOR_MINOR_X}" | tee -a $GITHUB_ENV

          # major.minor version without v prefix and with x suffix, i.e. 25.4.x
          MAJOR_MINOR_X=$(echo ${V_MAJOR_MINOR_X#v})

          # name of the release branch for downstream components
          RELEASE_BRANCH=network-operator-${MAJOR_MINOR_X}
          echo "release_branch=${RELEASE_BRANCH}" >> $GITHUB_OUTPUT

          # tag for components
          TAG="network-operator-${APP_VERSION}"
          echo "component_tag=${TAG}" >> $GITHUB_OUTPUT

          # whether to sync Dependabot config to the release branch: rc/ga only,
          # never beta (betas are cut from master, the LTS branch is only real at rc)
          if echo "$APP_VERSION" | grep -q 'beta'; then
            SYNC_DEPENDABOT=false
          else
            SYNC_DEPENDABOT=true
          fi
          echo "sync_dependabot=${SYNC_DEPENDABOT}" >> $GITHUB_OUTPUT
      - id: set-chart-version
        run: |
          CHART_VERSION=$(echo ${APP_VERSION#v})
          echo "chart_version=${CHART_VERSION}" >> $GITHUB_OUTPUT
          echo "CHART_VERSION=${CHART_VERSION}" | tee -a $GITHUB_ENV
      - id: determine-base-branch
        run: |
          if echo $APP_VERSION | grep -q beta; then
            base_branch=master
          else
            base_branch=$V_MAJOR_MINOR_X
          fi
          echo "base_branch=${base_branch}" >> $GITHUB_OUTPUT
          echo BASE_BRANCH=$base_branch | tee -a $GITHUB_ENV
      - id: determine-docker-registry
        run: |
          if echo $APP_VERSION | grep -q '-'; then
            echo "docker_registry_network_operator=nvcr.io/nvstaging/mellanox" >> $GITHUB_OUTPUT
            echo "docker_registry_managed_components=nvcr.io/nvstaging/mellanox" >> $GITHUB_OUTPUT
          else
            echo "docker_registry_network_operator=nvcr.io/nvidia/cloud-native" >> $GITHUB_OUTPUT
            echo "docker_registry_managed_components=nvcr.io/nvidia/mellanox" >> $GITHUB_OUTPUT
          fi
      - name: Verify release branch exists if "rc" version
        run: |
          if echo $APP_VERSION | grep -q 'rc'; then
            git fetch origin
            if ! git ls-remote --heads origin $BASE_BRANCH | grep -q "$BASE_BRANCH"; then
              git config user.name  nvidia-ci-cd
              git config user.email svc-cloud-orch-gh@nvidia.com
              git checkout -b $BASE_BRANCH
              git push -u origin $BASE_BRANCH
            fi
          fi
    outputs:
      app_version: ${{ steps.set-version.outputs.app_version }}
      base_branch: ${{ steps.determine-base-branch.outputs.base_branch }}
      chart_version: ${{ steps.set-chart-version.outputs.chart_version }}
      component_tag: ${{ steps.set-version.outputs.component_tag }}
      docker_registry_network_operator: ${{ steps.determine-docker-registry.outputs.docker_registry_network_operator }}
      docker_registry_managed_components: ${{ steps.determine-docker-registry.outputs.docker_registry_managed_components }}
      docker_registry_staging: nvcr.io/nvstaging/mellanox
      release_branch: ${{ steps.set-version.outputs.release_branch }}
      sync_dependabot: ${{ steps.set-version.outputs.sync_dependabot }}

  get-managed-components:
    needs: determine-versions
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.determine-versions.outputs.base_branch }}
      - name: Validate downstreamFork consistency across entries sharing a sourceRepository
        run: |
          inconsistent=$(yq -o=json 'to_entries
              | map(select(.value.sourceRepository != null and .value.sourceRepository != "NVIDIA/k8s-launch-kit")
                    | {repo: .value.sourceRepository, fork: (.value.downstreamFork // false)})
              | group_by(.repo)
              | map(select((map(.fork) | unique | length) > 1) | .[0].repo)' \
            hack/release.yaml)
          if ! echo "$inconsistent" | jq -e '. == []' > /dev/null; then
            echo "ERROR: downstreamFork values disagree across entries sharing a sourceRepository:"
            echo "$inconsistent"
            exit 1
          fi
      - id: set-components
        run: |
          # Extract unique sourceRepository names for tagging
          repos=$(yq -o=json 'to_entries | map(select(.value.sourceRepository != null and .value.sourceRepository != "NVIDIA/k8s-launch-kit") | .value.sourceRepository)' hack/release.yaml | jq -c 'unique')
          echo "Managed repositories: $repos"
          echo "managed_repos=$(echo $repos)" >> $GITHUB_OUTPUT

          # Build a {sourceRepository: downstreamFork} map for downstream lookup.
          forks=$(yq -o=json 'to_entries
              | map(select(.value.sourceRepository != null and .value.sourceRepository != "NVIDIA/k8s-launch-kit")
                    | {(.value.sourceRepository): (.value.downstreamFork // false)})
              | add // {}' hack/release.yaml | jq -c .)
          echo "downstream forks map: $forks"
          echo "downstream_forks=$forks" >> $GITHUB_OUTPUT
      - id: set-dependabot-repos
        run: |
          # Repos whose dependabot.yaml we own (dependabotSyncManaged: true).
          # Components keyed by sourceRepository; deduped to one entry per repo.
          sync=$(yq -o=json 'to_entries | map(select(.value.dependabotSyncManaged == true and .value.sourceRepository != null) | .value.sourceRepository) | unique' hack/release.yaml | jq -c .)
          # Mofed has no sourceRepository; its image is built from doca-driver-build
          # (added to the matrix via include), so map its flag to that repo.
          if [ "$(yq '.Mofed.dependabotSyncManaged // false' hack/release.yaml)" = "true" ] || \
             [ "$(yq '.MofedStigFips.dependabotSyncManaged // false' hack/release.yaml)" = "true" ]; then
            sync=$(echo "$sync" | jq -c '. + ["doca-driver-build"] | unique')
          fi
          echo "Dependabot-managed repositories: $sync"
          echo "dependabot_managed_repos=$(echo $sync)" >> $GITHUB_OUTPUT
    outputs:
      managed_repos: ${{ steps.set-components.outputs.managed_repos }}
      dependabot_managed_repos: ${{ steps.set-dependabot-repos.outputs.dependabot_managed_repos }}
      downstream_forks: ${{ steps.set-components.outputs.downstream_forks }}

  create-tags-for-components:
    runs-on: ubuntu-24.04
    needs: [determine-versions, get-managed-components]
    strategy:
      fail-fast: false  # allow all jobs to run independently
      matrix:
        repo: ${{ fromJson(needs.get-managed-components.outputs.managed_repos) }}
        include:
          - repo: doca-driver-build
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN_NVIDIA_CI_CD }}
      APP_VERSION: ${{ needs.determine-versions.outputs.app_version }}
      RELEASE_BRANCH: ${{ needs.determine-versions.outputs.release_branch }}
      COMPONENT_TAG: ${{ needs.determine-versions.outputs.component_tag }}
      DOWNSTREAM_FORKS: ${{ needs.get-managed-components.outputs.downstream_forks }}
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_TOKEN_NVIDIA_CI_CD }}
          repository: ${{ github.repository_owner }}/${{ matrix.repo }}
          path: ${{ matrix.repo }}
          fetch-depth: 0
      - name: Ensure release branch exists
        run: |
          cd ${{ matrix.repo }}
          git config user.name  nvidia-ci-cd
          git config user.email svc-cloud-orch-gh@nvidia.com
          git fetch origin

          # Resolve downstreamFork from the map built by get-managed-components.
          # Repos absent from release.yaml (e.g. doca-driver-build, added via matrix include)
          # default to false (NVIDIA-owned).
          DOWNSTREAM_FORK=$(echo "$DOWNSTREAM_FORKS" | jq -r --arg r "${{ matrix.repo }}" '.[$r] // false')
          echo "downstreamFork for ${{ matrix.repo }}: $DOWNSTREAM_FORK"

          is_beta=false
          echo "$APP_VERSION" | grep -q 'beta' && is_beta=true
          is_rc=false
          echo "$APP_VERSION" | grep -qE 'rc' && is_rc=true

          branch_exists=false
          git ls-remote --heads origin "$RELEASE_BRANCH" | grep -q "$RELEASE_BRANCH" && branch_exists=true

          if [ "$DOWNSTREAM_FORK" = "true" ]; then
            # Downstream fork of an upstream project: release branch is created on every release.
            if $branch_exists; then
              echo "Release branch exists, using it for tagging"
              git checkout "$RELEASE_BRANCH"
            else
              echo "Release branch doesn't exist, creating it from default branch"
              git checkout -b "$RELEASE_BRANCH"
              git push -u origin "$RELEASE_BRANCH"
            fi
          else
            # NVIDIA-owned: beta tags on default branch; RC creates the branch; GA requires it.
            if $is_beta; then
              echo "Beta on NVIDIA-owned repo: tagging on default branch (no checkout)"
            elif $branch_exists; then
              echo "Release branch exists, using it for tagging"
              git checkout "$RELEASE_BRANCH"
            elif $is_rc; then
              echo "First RC on NVIDIA-owned repo: creating release branch from default"
              git checkout -b "$RELEASE_BRANCH"
              git push -u origin "$RELEASE_BRANCH"
            else
              echo "ERROR: GA release $APP_VERSION but release branch $RELEASE_BRANCH does not exist in ${{ matrix.repo }}."
              echo "       Cut RC first, or investigate why the RC branch is missing."
              exit 1
            fi
          fi

          # Preserve the exact commit selected for tagging. The optional Dependabot
          # step below may switch to the repository's default branch.
          echo "TAG_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      # Add a target-branch Dependabot entry for the new release branch on the
      # component's default branch, so LTS branches receive version (security
      # patch) updates. Runs only for owned configs (dependabot_managed_repos)
      # on rc/ga (sync_dependabot). Non-blocking: a failure here must never hold
      # up the release tag. Must run BEFORE the tag is cut.
      - name: Sync Dependabot config for the new release branch
        if: >-
          needs.determine-versions.outputs.sync_dependabot == 'true' &&
          contains(fromJson(needs.get-managed-components.outputs.dependabot_managed_repos), matrix.repo)
        continue-on-error: true
        run: |
          cd ${{ matrix.repo }}
          DEFAULT_BRANCH=$(gh repo view ${{ github.repository_owner }}/${{ matrix.repo }} --json defaultBranchRef -q .defaultBranchRef.name)
          git checkout "$DEFAULT_BRANCH"
          git pull origin "$DEFAULT_BRANCH"

          CONFIG=.github/dependabot.yaml
          [ -f "$CONFIG" ] || CONFIG=.github/dependabot.yml
          if [ ! -f "$CONFIG" ]; then
            echo "::warning::${{ matrix.repo }} is dependabotSyncManaged but has no $CONFIG; $RELEASE_BRANCH left uncovered"
            exit 0
          fi

          # (1) already merged into the config on the default branch
          if yq -e '.updates[] | select(.["target-branch"] == strenv(RELEASE_BRANCH))' "$CONFIG" >/dev/null 2>&1; then
            echo "$RELEASE_BRANCH already present in $CONFIG; nothing to do"
            exit 0
          fi
          # (2) a sync PR is already open from a prior rc.N run
          if [ -n "$(gh pr list --repo ${{ github.repository_owner }}/${{ matrix.repo }} --head dependabot-sync-$RELEASE_BRANCH --state open --json number -q '.[].number')" ]; then
            echo "dependabot-sync PR for $RELEASE_BRANCH already open; nothing to do"
            exit 0
          fi

          # Clone every default-branch update entry, retarget it to the release
          # branch, and restrict the LTS branch to patch-only bumps.
          yq -i '.updates += [
            .updates[] | select(has("target-branch") | not)
            | . + {
                "target-branch": strenv(RELEASE_BRANCH),
                "ignore": ((.ignore // []) + [{"dependency-name": "*", "update-types": ["version-update:semver-major", "version-update:semver-minor"]}])
              }
          ]' "$CONFIG"

          git checkout -b dependabot-sync-$RELEASE_BRANCH
          git commit -sam "ci: add Dependabot config for $RELEASE_BRANCH"
          # --force-with-lease: re-cut the CI-owned sync branch if a prior PR was
          # closed without merging and left the remote branch behind. The lease
          # (checkout uses fetch-depth: 0, so the remote-tracking ref exists)
          # still refuses to clobber genuine concurrent pushes.
          git push --force-with-lease -u origin dependabot-sync-$RELEASE_BRANCH
          gh pr create \
            --repo ${{ github.repository_owner }}/${{ matrix.repo }} \
            --base "$DEFAULT_BRANCH" \
            --head dependabot-sync-$RELEASE_BRANCH \
            --title "ci: Dependabot config for $RELEASE_BRANCH" \
            --body "Adds version updates for the \`$RELEASE_BRANCH\` release branch (patch-only). Auto-opened by the network-operator [*${{ github.job }}* job](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) when the branch was cut."

      # Cut the tag LAST, after the Dependabot PR has been raised. TAG_COMMIT is
      # the release branch commit, except for NVIDIA-owned beta releases where it
      # intentionally points at the default branch.
      - name: Create release tag
        run: |
          cd ${{ matrix.repo }}

          echo "Checking if tag already exists: $COMPONENT_TAG"
          if git ls-remote --tags origin | grep -q "refs/tags/$COMPONENT_TAG$"; then
            echo "Tag $COMPONENT_TAG already exists, skipping tag creation"
          else
            echo "Creating and pushing the tag: $COMPONENT_TAG"
            git tag "$COMPONENT_TAG" "$TAG_COMMIT"
            git push origin --tags
          fi

  wait-for-images:
    runs-on: ubuntu-24.04
    needs: [determine-versions, get-managed-components, create-tags-for-components]
    env:
      COMPONENT_TAG: ${{ needs.determine-versions.outputs.component_tag }}
      DOCKER_REGISTRY: ${{ needs.determine-versions.outputs.docker_registry_staging }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.determine-versions.outputs.base_branch }}
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.NVCR_USERNAME }}
          password: ${{ secrets.NVCR_TOKEN }}
      - name: Wait for images to be available
        run: |
          echo "Waiting for images to be pullable from registry..."

          MAX_RETRIES=120
          SLEEP_INTERVAL=60
          retry_count=0

          components_to_parse=$(yq 'to_entries | map(select(.value.sourceRepository != null and .value.sourceRepository != "NVIDIA/k8s-launch-kit") | .key) | join(" ")' hack/release.yaml)
          for component in $components_to_parse; do
            # parse image
            component_image=$(yq ".${component}.image" hack/release.yaml)  # example: nic-configuration-operator-daemon-stig-fips
            # determine docker tag by component name
            if [[ "$component" == *StigFips?* ]]; then
              component_flavor=$(echo "$component" | sed -E 's/.+StigFips//' | tr [:upper:] [:lower:])  # extracts "ubuntu" (lowercase) from "spectrumXOperatorStigFipsUbuntu" (camelcase)
              component_tag="${COMPONENT_TAG}-stig-fips-${component_flavor}"  # example: network-operator-v26.1.0-beta.5-stig-fips-rhel
            elif [[ "$component" == *StigFips ]]; then
              component_tag="${COMPONENT_TAG}-stig-fips"
            else
              component_tag="${COMPONENT_TAG}"
            fi

            # image to check
            image_url="${DOCKER_REGISTRY}/${component_image}:${component_tag}"

            echo "Checking availability of: ${image_url}"
            while [ $retry_count -lt $MAX_RETRIES ]; do
              if docker manifest inspect "${image_url}" > /dev/null 2>&1; then
                echo "  Image available: ${image_url}"
                break
              else
                echo "  Image not yet available: ${image_url} (attempt $((retry_count + 1))/$MAX_RETRIES)"
                sleep $SLEEP_INTERVAL
                retry_count=$((retry_count + 1))
              fi
            done

            if [ $retry_count -eq $MAX_RETRIES ]; then
              echo "      Failed to find image after $MAX_RETRIES attempts: ${image_url}"
              exit 1
            fi
          done

          echo "All images are available"

  create-release-pr:
    needs: [determine-versions, wait-for-images]
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN_NVIDIA_CI_CD }}
      APP_VERSION: ${{ needs.determine-versions.outputs.app_version }}
      BASE_BRANCH: ${{ needs.determine-versions.outputs.base_branch }}
      CHART_VERSION: ${{ needs.determine-versions.outputs.chart_version }}
      DOCKER_REGISTRY_NETWORK_OPERATOR: ${{ needs.determine-versions.outputs.docker_registry_network_operator }}
      DOCKER_REGISTRY_MANAGED_COMPONENTS: ${{ needs.determine-versions.outputs.docker_registry_managed_components }}
      COMPONENT_TAG: ${{ needs.determine-versions.outputs.component_tag }}
    steps:
      # Chart sources are checked out at the component tag rather than the release branch:
      # NVIDIA-owned chart-providers (e.g. maintenance-operator) have no release branch on
      # beta releases under the downstreamFork-aware tagging logic, but the tag always exists.
      - uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/sriov-network-operator
          path: sriov-network-operator
          ref: ${{ needs.determine-versions.outputs.component_tag }}
      - uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/node-feature-discovery
          path: node-feature-discovery
          ref: ${{ needs.determine-versions.outputs.component_tag }}
      - uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/maintenance-operator
          path: maintenance-operator
          ref: ${{ needs.determine-versions.outputs.component_tag }}
      - uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/network-operator
          path: network-operator
      - name: Create staging branch and update component versions
        run: |
          cd network-operator
          git config user.name  nvidia-ci-cd
          git config user.email svc-cloud-orch-gh@nvidia.com
          git fetch origin $BASE_BRANCH

          git checkout -b staging-${APP_VERSION} origin/$BASE_BRANCH

          # Update Network Operator version
          yq -i '.NetworkOperator.version = "${{ env.APP_VERSION }}"' hack/release.yaml
          yq -i '.NetworkOperator.repository = "${{ env.DOCKER_REGISTRY_NETWORK_OPERATOR }}"' hack/release.yaml

          # Update components with sourceRepository to use new registry and version
          for component in $(yq 'keys | .[]' hack/release.yaml); do
            SOURCE_REPO=$(yq ".${component}.sourceRepository" hack/release.yaml)

            # Skip components without sourceRepository or k8sLaunchKit (its updates are managed manually for now)
            if [ "$SOURCE_REPO" = "null" ] || [ "$SOURCE_REPO" = "NVIDIA/k8s-launch-kit" ]; then
              continue
            fi

            # We always need to add '-stig-fips' suffix for corresponding image version
            # TODO: do not DOCA Driver image for now because $SOURCE_REPO is null one Network Operator will support a new version format
            if [[ "$component" == *StigFips?* ]]; then
              component_flavor=$(echo "$component" | sed -E 's/.+StigFips//' | tr [:upper:] [:lower:])  # extracts "ubuntu" (lowercase) from "spectrumXOperatorStigFipsUbuntu" (camelcase)
              component_tag="${COMPONENT_TAG}-stig-fips-${component_flavor}"
            elif [[ "$component" == *StigFips ]]; then
              component_tag="${COMPONENT_TAG}-stig-fips"
            else
              component_tag="${COMPONENT_TAG}"
            fi

            echo "Updating component: $component"
            echo "  Setting repository to: $DOCKER_REGISTRY_MANAGED_COMPONENTS"
            echo "  Setting version to: $component_tag"

            # Update repository and version for components with sourceRepository
            yq -i ".${component}.repository = \"$DOCKER_REGISTRY_MANAGED_COMPONENTS\"" hack/release.yaml
            yq -i ".${component}.version = \"$component_tag\"" hack/release.yaml

            # Pull the component's helm chart
            CHART_LOCATION=$(yq ".${component}.chartLocation" hack/release.yaml)
            # Skip next steps if component doesn't export a helm chart
            if [ "$CHART_LOCATION" = "null" ]; then
              continue
            fi

            CHART_NAME=$(yq ".${component}.chartName" hack/release.yaml)
            # Use SOURCE_REPO if chartName is null or empty
            if [ "$CHART_NAME" = "null" ] || [ -z "$CHART_NAME" ]; then
              CHART_NAME=$SOURCE_REPO
            fi
            CHART_LOCATION_IN_NETWORK_OPERATOR=deployment/network-operator/charts/$CHART_NAME
            rm -rf $CHART_LOCATION_IN_NETWORK_OPERATOR/*
            cp -r ../$SOURCE_REPO/$CHART_LOCATION/* $CHART_LOCATION_IN_NETWORK_OPERATOR

            if ! git diff --color --unified=0 --exit-code; then
              git add $CHART_LOCATION_IN_NETWORK_OPERATOR
            fi

            # Exclude chart files from update if specified in hack/release.yaml
            EXCLUDE_CHART_FILES=$(yq ".${component}.excludeChartFiles" hack/release.yaml)
            if [ -n "$EXCLUDE_CHART_FILES" ] && [ "$EXCLUDE_CHART_FILES" != "null" ]; then
              echo "$EXCLUDE_CHART_FILES" | jq -r '.[]' | while read -r file_rel; do
                file="$CHART_LOCATION_IN_NETWORK_OPERATOR/$file_rel"
                echo "Processing excluded file: $file"
                git restore --staged "$file" 2>/dev/null || true
                if ! git checkout HEAD -- "$file" 2>/dev/null; then
                  echo "File $file not found in HEAD, deleting it."
                  rm -f "$file"
                else
                  echo "Restored $file from HEAD."
                fi
              done
            fi
          done

          # Special handling for Mofed component (update registry only, not version, for all releases)
          echo "Updating Mofed components registry for release"
          yq -i         '.Mofed.repository = "${{ env.DOCKER_REGISTRY_MANAGED_COMPONENTS }}"' hack/release.yaml
          yq -i '.MofedStigFips.repository = "${{ env.DOCKER_REGISTRY_MANAGED_COMPONENTS }}"' hack/release.yaml

          # Update chart versions
          yq -i '.version = "${{ env.CHART_VERSION }}"'  deployment/network-operator/Chart.yaml
          yq -i '.appVersion = "${{ env.APP_VERSION }}"' deployment/network-operator/Chart.yaml
          make release-build
          make generate-sosreport-maps

          # Generate release-nvstaging.yaml for GA releases (no rc/beta suffix)
          if ! echo "$APP_VERSION" | grep -q '-'; then
            sed \
              -e 's|nvcr.io/nvidia/mellanox|nvcr.io/nvstaging/mellanox|g' \
              -e 's|nvcr.io/nvidia/cloud-native|nvcr.io/nvstaging/mellanox|g' \
              hack/release.yaml > hack/release-nvstaging.yaml
          fi

          if ! git diff --color --unified=0 --exit-code; then
            git add deployment/network-operator/
            git add hack/release.yaml
            git add hack/release-nvstaging.yaml
            git add scripts/sosreport/network-operator-sosreport.sh
            git add scripts/sosreport/kubectl-netop_sosreport
            git commit -sam "cicd: release Network Operator $APP_VERSION"
            git push -u origin staging-${APP_VERSION}
          fi

          gh pr create \
            --repo ${{ github.repository_owner }}/network-operator \
            --base $BASE_BRANCH \
            --head $(git branch --show-current) \
            --title "cicd: release Network Operator $APP_VERSION" \
            --body "Created by the [*${{ github.job }}* job](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
