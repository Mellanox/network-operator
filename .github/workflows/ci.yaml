name: Docker, Helm, and OCP CI

on:
  push:
    branches:
    - "master"
    - "v*.x"
    - "pull-request/[0-9]+"  # utilizes nvidia copy-pr-bot: https://github.com/nv-gha-runners/docs/blob/main/docs/platform/apps/copy-pr-bot/index.md
    tags:
    - "v*"

# note: various environment variable names are set to match expectation from the Makefile; do not change without comparing
env:
  DEFAULT_BRANCH: master
  REGISTRY: nvcr.io/nvstaging/mellanox
  IMAGE_NAME: network-operator

jobs:
  docker-build-push:
    runs-on: linux-amd64-cpu4
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@v7
    - name: Setup Go Proxy
      id: setup-go-proxy
      uses: nv-gha-runners/setup-artifactory-go-proxy@main
    - name: Determine docker tags
      id: docker-tags
      run: |
        git_sha=$(git rev-parse --short=12 HEAD)                               # short git commit hash
        git_tag=${{ github.ref_type == 'tag' && github.ref_name || '' }}       # git tag, if triggered by tag event
        latest=${{ github.ref_name == env.DEFAULT_BRANCH && 'latest' || '' }}  # 'latest', if branch is master

        # Build comma-separated tags for docker/build-push-action
        tags=""
        for tag in $git_sha $git_tag $latest; do
          if [ -n "$tag" ]; then
            if [ -z "$tags" ]; then
              tags="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$tag"
            else
              tags="$tags,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$tag"
            fi
          fi
        done
        echo "tags=$tags" | tee -a $GITHUB_OUTPUT

        # all events reaching here are trusted:
        # - push to master/v*.x/tags: standard ci
        # - push to pull-request/*: copy-pr-bot is the trust gate; untrusted fork prs
        #   require a maintainer /ok-to-test before copy-pr-bot syncs the branch
        # - pull_request from same-repo branches: fork prs are blocked at the
        #   self-hosted runner infrastructure level
        push=true
        echo "push=$push" | tee -a $GITHUB_OUTPUT

        # determine if chart & bundle shall be published
        if [[ "$push" == "true" && ("${{ github.ref_type }}" == "tag" || "${{ github.ref_name }}" == "${{ env.DEFAULT_BRANCH }}") ]]; then
          publish=true
        else
          publish=false
        fi
        echo "publish=$publish" | tee -a $GITHUB_OUTPUT
    - uses: docker/setup-qemu-action@v4
    - uses: docker/setup-buildx-action@v4
      with:
        buildkitd-config: /etc/buildkit/buildkitd.toml
    - uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.NVCR_USERNAME }}
        password: ${{ secrets.NVCR_TOKEN }}
    - uses: docker/build-push-action@v7
      env:
        GOPROXY: ${{ steps.setup-go-proxy.outputs.goproxy-url || 'direct' }}
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.docker-tags.outputs.tags }}
        push: ${{ steps.docker-tags.outputs.push }}
        build-args: |
          GOPROXY=${{ env.GOPROXY }}
    outputs:
      default_branch: ${{ env.DEFAULT_BRANCH }}  # we output this here, to use in the following job's conditioning (due to github actions environment variable scope limitations).
      publish: ${{ steps.docker-tags.outputs.publish }}

  helm-package-publish:
    if: needs.docker-build-push.outputs.publish == 'true'
    needs:
    - docker-build-push
    runs-on: linux-amd64-cpu4
    env:
      NGC_REPO: nvstaging/mellanox/network-operator
    steps:
    - uses: actions/checkout@v7
    - name: NGC setup and authentication
      run: |
        wget \
          --no-verbose \
          --content-disposition \
          -O ngccli_linux.zip \
          https://api.ngc.nvidia.com/v2/resources/nvidia/ngc-apps/ngc_cli/versions/3.160.1/files/ngccli_linux.zip
        unzip -q ngccli_linux.zip
        echo "./ngc-cli" >> $GITHUB_PATH

        ngc-cli/ngc config set <<EOF
          ${{ secrets.NVCR_TOKEN }}
          json
          nvstaging
          mellanox
          no-ace
        EOF
    - name: Make package and push (`current_version+git_sha` as chart version)
      run: |
        git_sha=$(git rev-parse --short=12 HEAD)  # short git commit hash
        current_chart_version=$(yq '.version' deployment/network-operator/Chart.yaml)
        APP_VERSION=$git_sha VERSION=$current_chart_version-$git_sha make chart-build chart-push \
          2> >(tee error.log) || grep 'already exists in the repository' error.log  # catches any errors to `error.log`; if there is a specific error - passes (exit 0)
    - name: Make package and push (`git_tag` as chart version)
      if: github.ref_type == 'tag'
      run: |
        git_tag=${{ github.ref_name }}

        APP_VERSION=$git_tag VERSION=${git_tag:1} make chart-build chart-push  # VERSION as 'v' prefix removed

    - name: Make pre-GA package and push (`git_tag-pre-ga` as chart version)
      if: github.ref_type == 'tag' && !contains(github.ref_name, '-')
      run: |
        git_tag=${{ github.ref_name }}

        # Patch values.yaml to point to nvstaging repositories
        sed -i \
          -e 's|nvcr.io/nvidia/mellanox|nvcr.io/nvstaging/mellanox|g' \
          -e 's|nvcr.io/nvidia/cloud-native|nvcr.io/nvstaging/mellanox|g' \
          deployment/network-operator/values.yaml

        APP_VERSION=$git_tag VERSION=${git_tag:1}-pre-ga make chart-build chart-push

        # Restore values.yaml so subsequent steps see the original production values
        git checkout -- deployment/network-operator/values.yaml

  ocp-bundle:
    if: needs.docker-build-push.outputs.publish == 'true'
    needs:
    - docker-build-push
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN_NVIDIA_CI_CD }}
      DOWNSTREAM_REPO_OWNER: nvidia-ci-cd
      UPSTREAM_REPO_OWNER: redhat-openshift-ecosystem
    steps:
    - uses: actions/checkout@v7
      with:
        token: ${{ secrets.GH_TOKEN_NVIDIA_CI_CD }}  # token must be explicitly set here for push to work in following step
    - name: Determine version, tag, and base branch
      run: |
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          git_tag=${{ github.ref_name }}
          echo VERSION_WITH_PREFIX=$git_tag | tee -a $GITHUB_ENV
          echo VERSION_WITHOUT_PREFIX=${git_tag:1} | tee -a $GITHUB_ENV  # without the 'v' prefix
          if echo $git_tag | grep beta; then
            base_branch=$DEFAULT_BRANCH
          else
            v_major_minor=$(echo $git_tag | grep -Eo '^v[0-9]+\.[0-9]+')
            base_branch=$v_major_minor.x
          fi
          echo BASE_BRANCH=$base_branch | tee -a $GITHUB_ENV
        elif [[ "${{ github.ref_type }}" == "branch" ]]; then
          echo VERSION_WITH_PREFIX=$(git rev-parse --short=12 HEAD) | tee -a $GITHUB_ENV
        fi
    - uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.NVCR_USERNAME }}
        password: ${{ secrets.NVCR_TOKEN }}
    - name: Lookup image digest
      run: |
        network_operator_digest=$(skopeo inspect docker://$REGISTRY/$IMAGE_NAME:$VERSION_WITH_PREFIX | jq -r .Digest)
        echo $network_operator_digest | wc -w | grep 1  # verifies value not empty
        echo NETWORK_OPERATOR_DIGEST=$network_operator_digest | tee -a $GITHUB_ENV
    - name: Make bundle
      env:
        TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ env.NETWORK_OPERATOR_DIGEST }}
        BUNDLE_IMG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-bundle:${{ env.VERSION_WITH_PREFIX }}
        NGC_CLI_API_KEY: ${{ secrets.NVCR_TOKEN }}
      run: |
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          version_major_minor=$(echo $VERSION_WITH_PREFIX | grep -Eo 'v[0-9]+\.[0-9]+')
          export CHANNELS=stable,$version_major_minor
          export DEFAULT_CHANNEL=stable
          export VERSION=${{ env.VERSION_WITHOUT_PREFIX }}
          release_repository=$(yq -r '.NetworkOperator.repository' hack/release.yaml)
          release_image=$(yq -r '.NetworkOperator.image' hack/release.yaml)
          export TAG="$release_repository/$release_image@$NETWORK_OPERATOR_DIGEST"
          if [[ "$VERSION_WITH_PREFIX" != *-* ]]; then
            # Merged PR #2648 generates the GA staging lookup contract while
            # hack/release.yaml remains the final production contract:
            # https://github.com/Mellanox/network-operator/pull/2648
            test -f hack/release-nvstaging.yaml
            [[ "$(yq -r '.NetworkOperator.version' hack/release-nvstaging.yaml)" == "$VERSION_WITH_PREFIX" ]]
            export DIGEST_RELEASE_DEFAULTS=release-nvstaging.yaml
          fi
        elif [[ "${{ github.ref_type }}" == "branch" ]]; then
          export CHANNELS=stable,v1.1  # hard coded
          export DEFAULT_CHANNEL=stable  # hard coded
          export VERSION=1.1.0-${{ env.VERSION_WITH_PREFIX }}  # using the commit hash
          export NETWORK_OPERATOR_VERSION=${{ env.VERSION_WITH_PREFIX }} #  for push use commit sha
        fi
        make bundle bundle-build bundle-push
        if [[ "${{ github.ref_type }}" == "branch" ]]; then
          export BUNDLE_IMG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-bundle:latest  # hard coded
          make bundle-build bundle-push
        fi
    - name: Create PR with bundle to Network Operator
      if: github.ref_type == 'tag'
      env:
        FEATURE_BRANCH: update-ocp-bundle-to-${{ env.VERSION_WITH_PREFIX }}
      run: |
        set -euo pipefail
        git config user.name  nvidia-ci-cd
        git config user.email svc-cloud-orch-gh@nvidia.com

        git checkout -B "$FEATURE_BRANCH"
        git add bundle
        git add bundle.Dockerfile
        if git diff --cached --quiet; then
          echo "Bundle sources already contain $VERSION_WITH_PREFIX; no PR update required"
          exit 0
        fi
        git commit -sm "task: update bundle to $VERSION_WITH_PREFIX"

        remote_sha=$(git ls-remote --heads origin "refs/heads/$FEATURE_BRANCH" | awk '{print $1}')
        if [[ -n "$remote_sha" ]]; then
          git push --force-with-lease="refs/heads/$FEATURE_BRANCH:$remote_sha" -u origin "$FEATURE_BRANCH"
        else
          git push -u origin "$FEATURE_BRANCH"
        fi

        existing_pr=$(gh pr list \
          --state open \
          --head "$FEATURE_BRANCH" \
          --base "$BASE_BRANCH" \
          --json number \
          --jq '.[0].number // empty')
        if [[ -n "$existing_pr" ]]; then
          echo "Updated existing bundle PR #$existing_pr"
        else
          gh pr create \
            --head "$FEATURE_BRANCH" \
            --base "$BASE_BRANCH" \
            --title "task: update bundle to $VERSION_WITH_PREFIX" \
            --body "Created by the *${{ github.job }}* job in [${{ github.repository }} OCP bundle CI](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
        fi
